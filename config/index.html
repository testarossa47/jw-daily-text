<title>Daily Text — Language</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #fff;
  color: #222;
  padding: 16px;
}
h1 {
  font-size: 20px;
  margin-bottom: 12px;
  text-align: center;
}
#search {
  width: 100%;
  padding: 10px 12px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 8px;
  margin-bottom: 12px;
  outline: none;
}
#search:focus { border-color: #799fcc; }
#count {
  font-size: 13px;
  color: #888;
  margin-bottom: 8px;
  text-align: center;
}
#current {
  text-align: center;
  padding: 8px;
  margin-bottom: 12px;
  background: #f0f4f8;
  border-radius: 6px;
  font-size: 14px;
  color: #555;
}
#current strong { color: #222; }
#list {
  list-style: none;
  max-height: 60vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#list li {
  padding: 12px 14px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
  font-size: 16px;
  transition: background 0.15s;
}
#list li:active, #list li:hover {
  background: #e8f0f8;
}
#list li.selected {
  background: #799fcc;
  color: #fff;
  font-weight: 600;
}
#list li .sub {
  font-size: 12px;
  color: #999;
  display: block;
  margin-top: 2px;
}
#list li.selected .sub { color: #cde; }
.hidden { display: none; }
</style>
</head>

me": "Didza Xhidza"}, {"locale": "zab", "lib": "lp-zpd", "name": "Ditsa"}, {"locale": "dje", "lib": "lp-zr", "name": "Zarma"}, {"locale": "kiu", "lib": "lp-zzn", "name": "Zazaca (Kuzey)"}, {"locale": "zib", "lib": "lp-zsl", "name": "Zimbabwe Sign Language"}, {"locale": "zu", "lib": "lp-zu", "name": "IsiZulu"}];

let currentLocale = null;
let currentLib = null;

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { locale: p.get("locale"), lib: p.get("lib") };
}

function showCurrent() {
  const el = document.getElementById("current");
  if (currentLocale) {
    const cur = LANGUAGES.find(l => l.locale === currentLocale);
    if (cur) {
      el.innerHTML = "Current: <strong>" + cur.name + "</strong>";
      return;
    }
  }
  el.innerHTML = "Current: <strong>English</strong>";
}

function renderList(filter) {
  const list = document.getElementById("list");
  const countEl = document.getElementById("count");
  list.innerHTML = "";
  const q = filter.toLowerCase().trim();
  const filtered = q
    ? LANGUAGES.filter(l => l.name.toLowerCase().includes(q) || l.locale.toLowerCase().includes(q))
    : LANGUAGES;
  countEl.textContent = filtered.length + " languages";
  for (const lang of filtered) {
    const li = document.createElement("li");
    if (lang.locale === currentLocale) li.className = "selected";
    li.innerHTML = lang.name + '<span class="sub">' + lang.locale + '</span>';
    li.addEventListener("click", () => selectLang(lang));
    list.appendChild(li);
  }
}

function selectLang(lang) {
  currentLocale = lang.locale;
  currentLib = lang.lib;
  renderList(document.getElementById("search").value);
  showCurrent();
  // Send back to Pebble app
  if (window.Pebble) {
    window.Pebble.sendWebviewCloseMessage(JSON.stringify({
      locale: lang.locale,
      lib: lang.lib,
      name: lang.name
    }));
  }
}

const params = getParams();
currentLocale = params.locale || null;
currentLib = params.lib || null;
showCurrent();
renderList("");

document.getElementById("search").addEventListener("input", function() {
  renderList(this.value);
});
</script>
