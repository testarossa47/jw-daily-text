<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Daily Text — Language</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #fff;
  color: #222;
  padding: 16px;
  padding-bottom: 80px;
}
h1 {
  font-size: 20px;
  margin-bottom: 12px;
  text-align: center;
}
#search {
  width: 100%;
  padding: 10px 12px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 8px;
  margin-bottom: 12px;
  outline: none;
}
#search:focus { border-color: #799fcc; }
#count {
  font-size: 13px;
  color: #888;
  margin-bottom: 8px;
  text-align: center;
}
#current {
  text-align: center;
  padding: 8px;
  margin-bottom: 12px;
  background: #f0f4f8;
  border-radius: 6px;
  font-size: 14px;
  color: #555;
}
#current strong { color: #222; }
#list {
  list-style: none;
  max-height: 55vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#list li {
  padding: 12px 14px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
  font-size: 16px;
  transition: background 0.15s;
}
#list li:active, #list li:hover {
  background: #e8f0f8;
}
#list li.selected {
  background: #799fcc;
  color: #fff;
  font-weight: 600;
}
#list li .sub {
  font-size: 12px;
  color: #999;
  display: block;
  margin-top: 2px;
}
#list li.selected .sub { color: #cde; }
#cache-section {
  margin: 12px 0;
  padding: 10px 14px;
  background: #f9f9f9;
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
#cache-section label {
  font-size: 14px;
  color: #555;
  flex: 1;
}
#cache-days {
  width: 60px;
  padding: 6px 8px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 6px;
  text-align: center;
  outline: none;
}
#cache-days:focus { border-color: #799fcc; }
#save-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  border-top: 1px solid #ddd;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
#save-bar .info { flex: 1; font-size: 14px; color: #666; }
#save-bar .info strong { color: #222; }
#save-btn {
  padding: 10px 24px;
  background: #799fcc;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
#save-btn:active { background: #5a8ab8; }
#status {
  text-align: center;
  padding: 8px;
  margin-top: 8px;
  border-radius: 6px;
  font-size: 14px;
  display: none;
}
#status.ok { display: block; background: #e8f5e9; color: #2e7d32; }
#status.err { display: block; background: #fce4ec; color: #c62828; }
</style>
</head>
<body>
<h1>Select Language</h1>
<div id="current"></div>
<input type="text" id="search" placeholder="Search languages..." autocomplete="off">
<div id="count"></div>
<ul id="list"></ul>
<div id="cache-section">
  <label for="cache-days">Offline days (1&#8211;14):</label>
  <input type="number" id="cache-days" min="1" max="14" value="7">
</div>
<div id="status"></div>

<div id="save-bar">
  <div class="info" id="bar-info">Select a language, then tap <strong>Save</strong></div>
  <button id="save-btn" onclick="saveSelection()">Save</button>
</div>

let selectedLocale = null;
let selectedLib = null;
let selectedName = null;
let selectedRsconf = null;

function showCurrent() {
  const el = document.getElementById("current");
  if (selectedLocale) {
    const cur = LANGUAGES.find(l => l.locale === selectedLocale);
    if (cur) {
      el.innerHTML = "Current: <strong>" + cur.name + "</strong>";
      return;
    }
  }
  el.innerHTML = "Current: <strong>English</strong>";
}

function renderList(filter) {
  const list = document.getElementById("list");
  const countEl = document.getElementById("count");
  list.innerHTML = "";
  const q = filter.toLowerCase().trim();
  const filtered = q
    ? LANGUAGES.filter(l => l.name.toLowerCase().includes(q) || l.locale.toLowerCase().includes(q))
    : LANGUAGES;
  countEl.textContent = filtered.length + " languages";
  for (const lang of filtered) {
    const li = document.createElement("li");
    if (lang.locale === selectedLocale) li.className = "selected";
    li.innerHTML = lang.name + '<span class="sub">' + lang.locale + '</span>';
    li.addEventListener("click", () => pickLang(lang));
    list.appendChild(li);
  }
}

function pickLang(lang) {
  selectedLocale = lang.locale;
  selectedLib = lang.lib;
  selectedName = lang.name;
  selectedRsconf = lang.rsconf || "1";
  renderList(document.getElementById("search").value);
  document.getElementById("bar-info").innerHTML = "Selected: <strong>" + lang.name + "</strong>";
}

function saveSelection() {
  const statusEl = document.getElementById("status");
  if (!selectedLocale) {
    statusEl.className = "err";
    statusEl.textContent = "Select a language first.";
    return;
  }

  let cacheDays = parseInt(document.getElementById("cache-days").value, 10);
  if (isNaN(cacheDays) || cacheDays < 1) cacheDays = 1;
  if (cacheDays > 14) cacheDays = 14;

  const data = JSON.stringify({
    locale: selectedLocale,
    lib: selectedLib,
    name: selectedName,
    rsconf: selectedRsconf || "1",
    cacheDays: cacheDays
  });

  let saved = false;
  try {
    if (window.Pebble && typeof window.Pebble.sendWebviewCloseMessage === "function") {
      window.Pebble.sendWebviewCloseMessage(data);
      saved = true;
    }
  } catch (e) {}

  if (!saved) {
    try {
      window.location = "pebblejs://close#" + encodeURIComponent(data);
      saved = true;
    } catch (e) {}
  }

  if (saved) {
    statusEl.className = "ok";
    statusEl.textContent = "Saved! Closing...";
  } else {
    statusEl.className = "err";
    statusEl.textContent = "Could not save (not in Pebble app?)";
  }
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { locale: p.get("locale"), lib: p.get("lib"), rsconf: p.get("rsconf") };
}

const params = getParams();
if (params.locale && params.lib) {
  const found = LANGUAGES.find(l => l.locale === params.locale);
  if (found) {
    selectedLocale = found.locale;
    selectedLib = found.lib;
    selectedName = found.name;
    selectedRsconf = found.rsconf || params.rsconf || "1";
  }
}
showCurrent();
renderList("");

document.getElementById("search").addEventListener("input", function() {
  renderList(this.value);
});
</script>
